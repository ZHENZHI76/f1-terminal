version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: f1-terminal-backend
    restart: always
    ports:
      - "127.0.0.1:38000:8000"
    environment:
      # CORS: Allow front-end production domain to access API
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # DeepSeek-Reasoner API Key for AI Insight reports
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      # CRITICAL: Maps the internal f1_cache to the host machine.
      # This prevents the FIA APIs from throttling us or re-downloading 
      # tens of Gigabytes of raw telemetry on every container restart.
      - ./backend/f1_cache:/app/f1_cache
    networks:
      - f1-net

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      # CRITICAL: NEXT_PUBLIC_* must be injected at BUILD TIME, not runtime.
      # Next.js bakes these into the JavaScript bundle during `npm run build`.
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: f1-terminal-frontend
    restart: always
    ports:
      - "127.0.0.1:35000:3000"
    depends_on:
      - backend
    networks:
      - f1-net

networks:
  f1-net:
    driver: bridge
